<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — StylMart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <div class="top-bar">Admin Panel · StylMart</div>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-brand"><span class="brand-icon">SM</span>StylMart</a>
      <button class="mobile-toggle" onclick="toggleMobileMenu()">
        <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="nav-center" id="nav-center">
        <a href="/">Home</a>
        <a href="/pages/products.html">Mart</a>
      </div>
      <div class="nav-right" id="nav-right">
        <a href="/pages/login.html" class="btn btn-primary btn-sm">Sign In</a>
      </div>
    </div>
  </nav>

  <div class="dashboard">
    <div class="dashboard-header">
      <div>
        <h1>Admin Dashboard</h1>
        <p>Manage users, orders, and products</p>
      </div>
      <a href="/" class="btn btn-outline">View Store</a>
    </div>
    <div class="dashboard-grid">
      <div class="dashboard-sidebar">
        <button class="dash-nav-item active" data-tab="overview" onclick="switchDashTab('overview')">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg> Overview
        </button>
        <button class="dash-nav-item" data-tab="users" onclick="switchDashTab('users')">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/></svg> Users
        </button>
        <button class="dash-nav-item" data-tab="orders" onclick="switchDashTab('orders')">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg> Orders
        </button>
        <button class="dash-nav-item" data-tab="products" onclick="switchDashTab('products')">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg> Products
        </button>
      </div>
      <div class="dashboard-content">
        <div class="dash-section active" id="dash-overview">
          <h2>Overview</h2>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-top:16px">
            <div style="background:var(--bg);border:2px solid var(--black);padding:24px">
              <div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:600;margin-bottom:8px">Users</div>
              <div style="font-size:2rem;font-weight:800" id="admin-user-count">—</div>
            </div>
            <div style="background:var(--bg);border:2px solid var(--black);padding:24px">
              <div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:600;margin-bottom:8px">Orders</div>
              <div style="font-size:2rem;font-weight:800" id="admin-order-count">—</div>
            </div>
            <div style="background:var(--bg);border:2px solid var(--black);padding:24px">
              <div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:600;margin-bottom:8px">Products</div>
              <div style="font-size:2rem;font-weight:800" id="admin-product-count">—</div>
            </div>
            <div style="background:var(--bg);border:2px solid var(--black);padding:24px">
              <div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:600;margin-bottom:8px">Revenue</div>
              <div style="font-size:1.3rem;font-weight:800" id="admin-revenue">—</div>
            </div>
          </div>
        </div>
        <div class="dash-section" id="dash-users">
          <h2>All Users</h2>
          <div id="admin-users-list"><div class="loading-container"><div class="spinner"></div></div></div>
        </div>
        <div class="dash-section" id="dash-orders">
          <h2>All Orders</h2>
          <div id="admin-orders-list"><div class="loading-container"><div class="spinner"></div></div></div>
        </div>
        <div class="dash-section" id="dash-products">
          <h2>All Products</h2>
          <div id="admin-products-list"><div class="loading-container"><div class="spinner"></div></div></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
