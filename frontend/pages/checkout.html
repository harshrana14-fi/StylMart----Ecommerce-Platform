<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — StylMart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <div class="top-bar">Free shipping on all orders · 30-day easy returns</div>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-brand"><span class="brand-icon">SM</span>StylMart</a>
      <button class="mobile-toggle" onclick="toggleMobileMenu()">
        <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="nav-center" id="nav-center">
        <a href="/">Home</a>
        <a href="/pages/products.html">Mart</a>
      </div>
      <div class="nav-right" id="nav-right">
        <a href="/pages/login.html" class="btn btn-primary btn-sm">Sign In</a>
      </div>
    </div>
  </nav>

  <div class="checkout-page">
    <div class="section-header"><h2>Checkout</h2></div>
    <div class="checkout-grid">
      <div id="checkout-container"><div class="loading-container"><div class="spinner"></div></div></div>
      <div id="checkout-sidebar"></div>
    </div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAOVYRIgupAurZup5y1PRh8Ismb1A3lLao&libraries=places&callback=Function.prototype" async defer></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/app.js"></script>

</html>
