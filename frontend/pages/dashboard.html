<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — StylMart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <div class="top-bar">Free shipping on all orders · 30-day easy returns</div>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-brand"><span class="brand-icon">SM</span>StylMart</a>
      <button class="mobile-toggle" onclick="toggleMobileMenu()">
        <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="nav-center" id="nav-center">
        <a href="/">Home</a>
        <a href="/pages/products.html">Mart</a>
      </div>
      <div class="nav-right" id="nav-right">
        <a href="/pages/login.html" class="btn btn-primary btn-sm">Sign In</a>
      </div>
    </div>
  </nav>

  <div class="dashboard">
    <div class="dashboard-header">
      <div>
        <h1>Dashboard</h1>
        <p>Manage your account and orders</p>
      </div>
      <a href="/pages/products.html" class="btn btn-outline">Browse Store</a>
    </div>
    <div class="dashboard-grid">
      <div class="dashboard-sidebar">
        <button class="dash-nav-item active" data-tab="overview" onclick="switchDashTab('overview')">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg> Overview
        </button>
        <button class="dash-nav-item" data-tab="profile" onclick="switchDashTab('profile')">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg> Profile
        </button>
        <button class="dash-nav-item" data-tab="orders" onclick="switchDashTab('orders')">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg> Order History
        </button>
      </div>
      <div class="dashboard-content">
        <div class="dash-section active" id="dash-overview">
          <h2>Welcome back, <span id="dash-name">—</span></h2>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-top:16px">
            <div style="background:var(--bg);border-radius:var(--radius-lg);padding:24px">
              <div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:600;margin-bottom:8px">Orders</div>
              <div style="font-size:2rem;font-weight:800" id="dash-order-count">—</div>
            </div>
            <div style="background:var(--bg);border-radius:var(--radius-lg);padding:24px">
              <div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:600;margin-bottom:8px">Role</div>
              <div style="font-size:2rem;font-weight:800;text-transform:capitalize" id="dash-role">—</div>
            </div>
            <div style="background:var(--bg);border-radius:var(--radius-lg);padding:24px">
              <div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:600;margin-bottom:8px">Member Since</div>
              <div style="font-size:1.1rem;font-weight:600" id="dash-joined">—</div>
            </div>
          </div>
          <div style="margin-top:24px;display:flex;gap:12px;flex-wrap:wrap">
            <a href="/pages/orders.html" class="btn btn-outline">View All Orders</a>
            <a href="/pages/seller-dashboard.html" class="btn btn-outline" id="dash-seller-btn" style="display:none">Seller Dashboard</a>
          </div>
        </div>
        <div class="dash-section" id="dash-profile">
          <h2>Profile</h2>
          <div class="profile-info">
            <div class="profile-field"><label>Name</label><p id="dash-name-display">—</p></div>
            <div class="profile-field"><label>Email</label><p id="dash-email">—</p></div>
            <div class="profile-field"><label>Role</label><p id="dash-role-display" style="text-transform:capitalize">—</p></div>
            <div class="profile-field"><label>Member Since</label><p id="dash-joined-display">—</p></div>
          </div>
          <h3 style="margin-top:32px;font-size:1rem;font-weight:600">Update Name</h3>
          <form onsubmit="updateProfile(event)" style="display:flex;gap:12px;margin-top:12px;max-width:400px">
            <input class="form-input" id="edit-name" placeholder="New name" style="flex:1;margin-bottom:0">
            <button type="submit" class="btn btn-primary">Save</button>
          </form>
        </div>
        <div class="dash-section" id="dash-orders">
          <h2>Recent Orders</h2>
          <div id="dash-orders-list"><p style="color:var(--text-muted)">Loading...</p></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/app.js"></script>
  <script>
    async function loadDashboardExtra() {
      try {
        const orders = await api.orders.list();
        const container = document.getElementById('dash-orders-list');
        if (orders.length === 0) {
          container.innerHTML = '<p style="color:var(--text-muted)">No orders yet. <a href="/pages/products.html" style="color:var(--black);font-weight:600">Start shopping</a></p>';
        } else {
          container.innerHTML = orders.slice(0, 5).map(o => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">
              <div><strong>Order #${o._id || o.id}</strong><span style="color:var(--text-muted);font-size:0.85rem;margin-left:12px">${new Date(o.createdAt).toLocaleDateString()}</span></div>
              <div style="display:flex;align-items:center;gap:12px"><span>₹${o.totalAmount.toFixed(2)}</span><span class="order-status ${o.status}">${o.status}</span><a href="/pages/order-tracking.html?id=${o._id || o.id}" class="btn btn-sm btn-outline" style="padding:4px 12px;font-size:0.7rem">Track</a></div>
            </div>`).join('');
          if (orders.length > 5) container.innerHTML += '<a href="/pages/orders.html" class="btn btn-outline btn-sm" style="margin-top:12px">View All Orders</a>';
        }
      } catch { document.getElementById('dash-orders-list').innerHTML = '<p style="color:var(--text-muted)">Could not load orders.</p>'; }
    }
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(loadDashboardExtra, 100);
    });
  </script>
</body>
</html>
