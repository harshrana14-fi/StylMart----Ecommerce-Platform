<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — StylMart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>
  <div class="top-bar">Free shipping on all orders · 30-day easy returns</div>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-brand"><span class="brand-icon">SM</span>StylMart</a>
      <button class="mobile-toggle" onclick="toggleMobileMenu()">
        <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="nav-center" id="nav-center">
        <a href="/">Home</a>
        <a href="/pages/products.html" class="active">Mart</a>
        </div>
      <div class="nav-right" id="nav-right">
        <a href="/pages/login.html" class="btn btn-primary btn-sm">Sign In</a>
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="section-header">
      <div>
        <h2>All Products</h2>
        <div class="subtitle" id="category-label">Browse our complete collection</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <a href="/pages/products.html" class="btn btn-sm ${!new URLSearchParams(window.location.search).get('category') ? 'btn-primary' : 'btn-outline'}">All</a>
        <a href="/pages/products.html?category=men" class="btn btn-sm cat-link" data-category="men">Men</a>
        <a href="/pages/products.html?category=women" class="btn btn-sm cat-link" data-category="women">Women</a>
        <a href="/pages/products.html?category=accessories" class="btn btn-sm cat-link" data-category="accessories">Accessories</a>
        <a href="/pages/products.html?category=electronics" class="btn btn-sm cat-link" data-category="electronics">Electronics</a>
        <a href="/pages/products.html?category=shoes" class="btn btn-sm cat-link" data-category="shoes">Shoes</a>
        <a href="/pages/products.html?category=sports" class="btn btn-sm cat-link" data-category="sports">Sports</a>
      </div>
    </div>
    <div style="margin-bottom:24px">
      <form class="search-bar" id="search-form" style="display:flex;gap:8px;max-width:400px">
        <input type="text" id="search-input" class="form-input" placeholder="Search products..." style="margin-bottom:0">
        <button type="submit" class="btn btn-primary">Search</button>
      </form>
    </div>
    <div class="product-grid" id="product-grid">
      <div class="loading-container"><div class="spinner"></div></div>
    </div>
  </section>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.querySelectorAll('.cat-link').forEach(el => {
      el.addEventListener('click', function(e) { e.preventDefault(); window.location.href = '/pages/products.html?category=' + this.dataset.category; });
    });
    const params = new URLSearchParams(window.location.search);
    if (params.get('category')) {
      document.querySelectorAll('.cat-link').forEach(el => {
        if (el.dataset.category === params.get('category')) el.classList.add('btn-primary');
        else el.classList.remove('btn-primary');
      });
      document.getElementById('category-label').textContent = 'Showing: ' + params.get('category');
    }
  </script>
</body>
</html>
