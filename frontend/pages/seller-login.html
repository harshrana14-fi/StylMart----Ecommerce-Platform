<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Sign In — StylMart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <nav class="navbar">
    <div class="navbar-inner" style="justify-content:center">
      <a href="/" class="navbar-brand"><span class="brand-icon">SM</span>StylMart</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1>Seller Sign In</h1>
      <p class="subtitle">Access your seller dashboard</p>
      <form onsubmit="handleSellerLogin(event)">
        <div id="form-error" style="color:var(--black);font-size:0.88rem;margin-bottom:16px;text-align:center"></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="email" type="email" placeholder="seller@example.com" required></div>
        <div class="form-group"><label class="form-label">Password</label><div class="password-wrapper"><input class="form-input" id="password" type="password" placeholder="Enter your password" required><button type="button" class="password-toggle" onclick="togglePasswordVisibility('password', this)" tabindex="-1"><svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button></div></div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Sign In</button>
      </form>
      <div class="form-footer">Not a seller? <a href="/pages/login.html">Customer sign in</a> · <a href="/pages/seller-register.html">Register as seller</a></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
